<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        :root { --bg: #f0f2f5; --card: #ffffff; --text: #1a1a1a; --accent: #4CAF50; --danger: #f44336; }
        [data-theme="dark"] { --bg: #1a1a2e; --card: #16213e; --text: #ffffff; --accent: #4CAF50; --danger: #e74c3c; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; }
        .auth-container { max-width: 400px; margin: 30px auto; padding: 25px; background: var(--card); border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .auth-tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #ddd; }
        .auth-tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-weight: bold; }
        .auth-tab.active { color: var(--accent); border-bottom: 3px solid var(--accent); margin-bottom: -2px; }
        .auth-form input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; background: var(--card); color: var(--text); font-size: 16px; }
        .btn { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .delete { background: var(--danger); }
        .header { background: var(--accent); color: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .profile-section { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid white; cursor: pointer; }
        .avatar-large { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin: 10px auto; display: block; }
        .tabs { display: flex; background: var(--card); padding: 10px; gap: 5px; }
        .tab { flex: 1; padding: 12px; text-align: center; background: #e0e0e0; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .tab.active { background: var(--accent); color: white; }
        .container { padding: 15px; max-width: 800px; margin: 0 auto; }
        .card { background: var(--card); padding: 15px; margin-bottom: 15px; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .subject { display: inline-block; background: var(--accent); color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; margin: 8px 0; }
        .form-box { background: var(--card); padding: 20px; border-radius: 15px; margin: 15px 0; }
        .form-box input, .form-box select, .form-box textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 10px; background: var(--card); color: var(--text); font-size: 16px; }
        .app-container { display: none; }
        .completed { opacity: 0.6; text-decoration: line-through; }
        .empty-state { text-align: center; padding: 40px; color: #666; }
        .theme-btn, .logout-btn { background: rgba(255,255,255,0.2); color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; }
        .checkbox-label { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .file-upload { border: 2px dashed #ddd; padding: 20px; text-align: center; border-radius: 10px; margin: 10px 0; cursor: pointer; }
        #avatarUpload { display: none; }
        @media (max-width: 480px) {
            .auth-container { margin: 15px; padding: 20px 15px; }
            .header h1 { font-size: 1.2rem; }
            .tab { padding: 10px 5px; font-size: 0.9rem; }
        }
        button, .tab, .auth-tab { min-height: 44px; touch-action: manipulation; }
        input, select, textarea { font-size: 16px !important; }
    </style>
</head>
<body>
    <div id="authContainer" class="auth-container">
        <div class="auth-tabs">
            <div class="auth-tab active" onclick="switchAuthTab('login')">Login</div>
            <div class="auth-tab" onclick="switchAuthTab('signup')">Sign Up</div>
        </div>
        <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
            <input type="email" id="loginEmail" placeholder="Email" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button type="submit" class="btn">Login</button>
        </form>
        <form id="signupForm" class="auth-form" style="display:none;" onsubmit="handleSignup(event)">
            <div class="file-upload" onclick="document.getElementById('avatarInput').click()">
                <img id="avatarPreview" class="avatar-large" src="https://ui-avatars.com/api/?name=User&background=4CAF50&color=fff&size=200" alt="Avatar">
                <p>Click to upload profile picture</p>
            </div>
            <input type="file" id="avatarInput" accept="image/*" style="display:none;" onchange="previewAvatar(event)">
            <input type="text" id="signupName" placeholder="Full Name" required>
            <input type="email" id="signupEmail" placeholder="Email" required>
            <input type="password" id="signupPassword" placeholder="Password" required>
            <button type="submit" class="btn">Sign Up</button>
        </form>
    </div>

    <div id="appContainer" class="app-container">
        <div class="header">
            <h1>📚 Student Hub</h1>
            <div class="profile-section">
                <img id="userAvatar" class="avatar" src="https://ui-avatars.com/api/?name=User&background=4CAF50&color=fff&size=200" alt="Profile" onclick="document.getElementById('profileUpload').click()">
                <input type="file" id="profileUpload" accept="image/*" style="display:none;" onchange="uploadAvatar(event)">
                <button class="theme-btn" onclick="toggleTheme()">🌙</button>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('notes')">📝 Notes</div>
            <div class="tab" onclick="switchTab('homework')">📚 Homework</div>
            <div class="tab" onclick="switchTab('plans')">📅 Planner</div>
        </div>
        <div class="container" id="content"><div class="loading">Loading...</div></div>
    </div>
<script>
    let currentTab = 'notes';
    let token = localStorage.getItem('token');
    let user = JSON.parse(localStorage.getItem('user') || '{}');
    let currentTheme = 'light';
    let avatarFile = null;

    if(token) showApp();

    function toggleTheme() {
        currentTheme = currentTheme === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', currentTheme);
        document.querySelector('.theme-btn').textContent = currentTheme === 'light' ? '🌙' : '☀️';
    }

    function previewAvatar(event) {
        const file = event.target.files[0];
        if(file) {
            avatarFile = file;
            const reader = new FileReader();
            reader.onload = e => document.getElementById('avatarPreview').src = e.target.result;
            reader.readAsDataURL(file);
        }
    }

    function switchAuthTab(tab) {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
        document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';
    }

    async function handleLogin(e) {
        e.preventDefault();
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPassword').value
            })
        });
        const data = await res.json();
        if(res.ok) {
            token = data.token;
            user = data.user;
            localStorage.setItem('token', token);
            localStorage.setItem('user', JSON.stringify(user));
            showApp();
        } else alert(data.message);
    }

    async function handleSignup(e) {
        e.preventDefault();
        const formData = new FormData();
        formData.append('name', document.getElementById('signupName').value);
        formData.append('email', document.getElementById('signupEmail').value);
        formData.append('password', document.getElementById('signupPassword').value);
        if(avatarFile) formData.append('avatar', avatarFile);
        
        const res = await fetch('/api/auth/register', {
            method: 'POST',
            body: formData
        });
        const data = await res.json();
        if(res.ok) {
            token = data.token;
            user = data.user;
            localStorage.setItem('token', token);
            localStorage.setItem('user', JSON.stringify(user));
            showApp();
        } else alert(data.message);
    }

    async function uploadAvatar(event) {
        const file = event.target.files[0];
        if(!file) return;
        
        const formData = new FormData();
        formData.append('avatar', file);
        
        try {
            const res = await fetch('/api/auth/upload-avatar', {
                method: 'POST',
                headers: {'x-auth-token': token},
                body: formData
            });
            const data = await res.json();
            user.avatar = data.avatar;
            localStorage.setItem('user', JSON.stringify(user));
            document.getElementById('userAvatar').src = data.avatar;
            alert('Profile picture updated!');
        } catch(err) {
            alert('Upload failed');
        }
    }

    function showApp() {
        document.getElementById('authContainer').style.display = 'none';
        document.getElementById('appContainer').style.display = 'block';
        if(user.avatar) document.getElementById('userAvatar').src = user.avatar;
        loadContent();
    }

    function logout() {
        localStorage.clear();
        token = null;
        user = {};
        document.getElementById('authContainer').style.display = 'block';
        document.getElementById('appContainer').style.display = 'none';
    }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        loadContent();
    }

    async function fetchData() {
        const res = await fetch(`/api/${currentTab}`, {
            headers: {'x-auth-token': token}
        });
        return await res.json();
    }

    async function deleteItem(id) {
        if(!confirm('Delete?')) return;
        await fetch(`/api/${currentTab}/${id}`, {
            method: 'DELETE',
            headers: {'x-auth-token': token}
        });
        loadContent();
    }

    async function toggleHomework(id, checked) {
        await fetch(`/api/homework/${id}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json', 'x-auth-token': token},
            body: JSON.stringify({completed: checked})
        });
        loadContent();
    }

    function showAddForm() {
        const formDiv = document.getElementById('addForm');
        let html = `<h3>Add New</h3>`;
        if(currentTab === 'notes') {
            html += `<input id="title" placeholder="Title"><select id="subject"><option>Physics</option><option>Chemistry</option><option>Math</option></select><textarea id="desc" placeholder="Description"></textarea><input id="by" placeholder="Your Name" value="${user.name || ''}">`;
        } else if(currentTab === 'homework') {
            html += `<input id="title" placeholder="Title"><select id="subject"><option>Physics</option><option>Chemistry</option><option>Math</option></select><input id="deadline" placeholder="Deadline">`;
        } else {
            html += `<input id="event" placeholder="Event"><input id="date" placeholder="Date"><input id="time" placeholder="Time">`;
        }
        html += `<button class="btn" onclick="saveItem()">Save</button><button class="btn delete" onclick="hideForm()">Cancel</button>`;
        formDiv.innerHTML = html;
        formDiv.style.display = 'block';
    }

    function hideForm() { document.getElementById('addForm').style.display = 'none'; }

    async function saveItem() {
        let data = {};
        if(currentTab === 'notes') {
            data = { title: document.getElementById('title').value, subject: document.getElementById('subject').value, description: document.getElementById('desc').value, uploadedBy: document.getElementById('by').value };
        } else if(currentTab === 'homework') {
            data = { title: document.getElementById('title').value, subject: document.getElementById('subject').value, deadline: document.getElementById('deadline').value };
        } else {
            data = { event: document.getElementById('event').value, date: document.getElementById('date').value, time: document.getElementById('time').value };
        }
        await fetch(`/api/${currentTab}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'x-auth-token': token},
            body: JSON.stringify(data)
        });
        hideForm();
        loadContent();
    }

    async function loadContent() {
        const items = await fetchData();
        let html = `<button class="btn" onclick="showAddForm()">➕ Add New</button><div id="addForm" class="form-box" style="display:none"></div>`;
        if(items.length === 0) html += `<div class="empty-state"><h3>No items</h3><p>Add something!</p></div>`;
        else items.forEach(item => {
            if(currentTab === 'notes') html += `<div class="card"><h3>${escapeHtml(item.title)}</h3><span class="subject">${escapeHtml(item.subject)}</span><p>${escapeHtml(item.description)}</p><small>By: ${escapeHtml(item.uploadedBy)}</small><button class="btn delete" onclick="deleteItem('${item._id}')">Delete</button></div>`;
            else if(currentTab === 'homework') html += `<div class="card ${item.completed ? 'completed' : ''}"><h3>${escapeHtml(item.title)}</h3><span class="subject">${escapeHtml(item.subject)}</span><p>Deadline: ${escapeHtml(item.deadline)}</p><label class="checkbox-label"><input type="checkbox" ${item.completed ? 'checked' : ''} onchange="toggleHomework('${item._id}', this.checked)"> Done</label><button class="btn delete" onclick="deleteItem('${item._id}')">Delete</button></div>`;
            else html += `<div class="card"><h3>${escapeHtml(item.event)}</h3><p>Date: ${escapeHtml(item.date)} | Time: ${escapeHtml(item.time)}</p><button class="btn delete" onclick="deleteItem('${item._id}')">Delete</button></div>`;
        });
        document.getElementById('content').innerHTML = html;
    }

    function escapeHtml(text) {
        if(!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
</script>
</body>
</html>
